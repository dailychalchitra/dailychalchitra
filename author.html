  bio: 'পল্লীকবি জসীম উদ্দীন (১ জানুয়ারি ১৯০৩ – ১৩ মার্চ ১৯৭৬) বাংলা সাহিত্যের অন্যতম শ্রেষ্ঠ কবি, গীতিকার, ঔপন্যাসিক ও লোকসাহিত্য সংগ্রাহক। গ্রামীণ বাংলার প্রকৃতি, মানুষের জীবন, সুখ-দুঃখ ও লোকসংস্কৃতিকে অসাধারণ শিল্পরূপ দেওয়ার জন্য তিনি "পল্লীকবি" নামে সমধিক পরিচিত।<br><br><b>জন্ম ও শিক্ষাজীবন:</b> ফরিদপুর জেলার তাম্বুলখানা গ্রামে মাতুলালয়ে জন্মগ্রহণ করেন। তাঁর পৈতৃক নিবাস একই জেলার গোবিন্দপুর গ্রামে। ১৯২১ সালে ফরিদপুর জেলা স্কুল থেকে প্রবেশিকা পরীক্ষায় উত্তীর্ণ হন এবং ১৯৩১ সালে কলকাতা বিশ্ববিদ্যালয় থেকে বাংলা ভাষা ও সাহিত্যে এম.এ ডিগ্রি অর্জন করেন।<br><br><b>কর্মজীবন:</b> ছাত্রাবস্থায় দীনেশচন্দ্র সেনের অধীনে রামতনু লাহিড়ী গবেষণা সহকারী হিসেবে কাজ করেন। ১৯৩৮ সালে ঢাকা বিশ্ববিদ্যালয়ের বাংলা বিভাগে প্রভাষক হিসেবে যোগদান করেন। পরবর্তীতে পূর্ব পাকিস্তান সরকারের তথ্য ও প্রচার বিভাগে উচ্চপদস্থ কর্মকর্তা হিসেবে দায়িত্ব পালন করেন।<br><br><b>সাহিত্যকর্ম:</b> গ্রামীণ জীবন ও বাংলার লোকঐতিহ্যকে তিনি বাংলা সাহিত্যে অনন্য উচ্চতায় নিয়ে গেছেন। তাঁর কালজয়ী রচনার মধ্যে রয়েছে <i>কবর</i>, <i>নকশী কাঁথার মাঠ</i>, <i>সোজন বাদিয়ার ঘাট</i>, <i>রাখালী</i>, <i>বালুচর</i>, <i>ধানক্ষেত</i> এবং <i>রঙিলা নায়ের মাঝি</i>।<br><br><b>সঙ্গীত অবদান:</b> তিনি একজন সফল গীতিকারও ছিলেন। তাঁর রচিত জনপ্রিয় গানের মধ্যে রয়েছে <i>আরে ও রঙিলা নায়ের মাঝি</i>, <i>উজান গাঙের নাইয়া</i> এবং <i>আমার বন্ধু বিনোদিয়ারে</i>।<br><br><b>মৃত্যু:</b> ১৩ মার্চ ১৯৭৬ সালে ঢাকায় মৃত্যুবরণ করেন। তাঁর ইচ্ছানুসারে ফরিদপুরের গোবিন্দপুর গ্রামে ডালিম গাছের নিচে তাঁকে সমাহিত করা হয়।'
},
  'জীবনানন্দ দাশ': {
  img: 'https://i.ibb.co/mVsdpSqv/jibanananda-das.jpg',
  bio: 'জীবনানন্দ দাশ (১৭ ফেব্রুয়ারি ১৮৯৯ – ২২ অক্টোবর ১৯৫৪) ছিলেন বিংশ শতাব্দীর অন্যতম প্রধান আধুনিক বাঙালি কবি, লেখক, ঔপন্যাসিক ও প্রাবন্ধিক। বাংলা কাব্যে আধুনিকতার পথিকৃৎ এই কবিকে তাঁর প্রকৃতিপ্রেম, গভীর জীবনবোধ, ইতিহাসচেতনা ও নিঃসঙ্গতার অনন্য প্রকাশভঙ্গির জন্য "রূপসী বাংলার কবি" বলা হয়। বুদ্ধদেব বসু তাঁকে "নির্জনতম কবি" এবং রবীন্দ্রনাথ ঠাকুর তাঁর কবিতাকে "চিত্ররূপময়" বলে অভিহিত করেছিলেন।<br><br><b>জন্ম ও শিক্ষাজীবন:</b><br>১৭ ফেব্রুয়ারি ১৮৯৯ সালে বরিশালে জন্মগ্রহণ করেন। পিতা সত্যানন্দ দাশ এবং মাতা কুসুমকুমারী দাশ—উভয়েই সাহিত্যচর্চার সঙ্গে যুক্ত ছিলেন। বরিশাল ব্রজমোহন কলেজ থেকে পড়াশোনা শেষ করে কলকাতা বিশ্ববিদ্যালয় থেকে ইংরেজি সাহিত্যে স্নাতকোত্তর ডিগ্রি অর্জন করেন।<br><br><b>কর্মজীবন:</b><br>তিনি বিভিন্ন কলেজে ইংরেজি সাহিত্যের অধ্যাপক হিসেবে কর্মরত ছিলেন। শিক্ষকতার পাশাপাশি সাহিত্যচর্চাই ছিল তাঁর জীবনের প্রধান সাধনা।<br><br><b>সাহিত্যকর্ম:</b><br>বাংলা কবিতায় তিনি সম্পূর্ণ নতুন এক আধুনিক ধারার সূচনা করেন। তাঁর কবিতায় প্রকৃতি, সময়, স্মৃতি, নিঃসঙ্গতা, মৃত্যু ও মানবজীবনের গভীর দর্শন অনন্যভাবে ফুটে উঠেছে।<br><br><b>উল্লেখযোগ্য কাব্যগ্রন্থ:</b><br>১. ঝরা পালক (১৯২৭)<br>২. ধূসর পাণ্ডুলিপি (১৯৩৬)<br>৩. বনলতা সেন (১৯৪২)<br>৪. মহাপৃথিবী (১৯৪৪)<br>৫. সাতটি তারার তিমির (১৯৪৮)<br>৬. রূপসী বাংলা (মরণোত্তর প্রকাশিত, ১৯৫৭)<br><br><b>অন্যান্য রচনা:</b><br>কবিতার পাশাপাশি তিনি উপন্যাস, ছোটগল্প ও প্রবন্ধও রচনা করেছেন। তাঁর সাহিত্যকর্ম বাংলা আধুনিক সাহিত্যের অন্যতম গুরুত্বপূর্ণ সম্পদ হিসেবে বিবেচিত।<br><br><b>জীবনাবসান:</b><br>১৯৫৪ সালের ২২ অক্টোবর কলকাতায় মৃত্যুবরণ করেন। মৃত্যুর পর তাঁর বহু অপ্রকাশিত রচনা প্রকাশিত হয় এবং বাংলা সাহিত্যে তাঁর মর্যাদা আরও সুদৃঢ় হয়।'
},
  'শরৎচন্দ্র চট্টোপাধ্যায়': {
  img: 'https://i.ibb.co/7M3Zrqr/shorathchandro-chattopatdhay.jpg',
  bio: 'শরৎচন্দ্র চট্টোপাধ্যায় (১৫ সেপ্টেম্বর ১৮৭৬ – ১৬ জানুয়ারি ১৯৩৮) ছিলেন বাংলা সাহিত্যের অন্যতম জনপ্রিয় ঔপন্যাসিক, গল্পকার ও প্রাবন্ধিক। বাংলা সাহিত্যে তাঁর অসাধারণ জনপ্রিয়তা এবং মানবজীবনের বাস্তব চিত্র তুলে ধরার অনন্য দক্ষতার জন্য তিনি "অপরাজেয় কথাশিল্পী" নামে সমধিক পরিচিত। গ্রামীণ সমাজ, মধ্যবিত্ত মানুষের জীবনসংগ্রাম, প্রেম, মানবিকতা এবং বিশেষ করে নারীর মনস্তত্ত্ব তাঁর সাহিত্যকর্মের প্রধান বিষয়।<br><br><b>জন্ম ও শিক্ষাজীবন:</b><br>১৫ সেপ্টেম্বর ১৮৭৬ সালে হুগলি জেলার দেবানন্দপুর গ্রামে জন্মগ্রহণ করেন। পিতা মতিলাল চট্টোপাধ্যায় এবং মাতা ভুবনমোহিনী দেবী। আর্থিক সংকটের কারণে তাঁর প্রাতিষ্ঠানিক শিক্ষাজীবন এফ.এ. শ্রেণিতে পড়ার সময়ই থেমে যায়।<br><br><b>কর্মজীবন:</b><br>জীবনের একটি সময় তিনি বার্মা (বর্তমান মিয়ানমার) রেলওয়ের হিসাব বিভাগে চাকরি করেন। পরবর্তীতে ভারতীয় জাতীয় কংগ্রেসের রাজনীতির সঙ্গে যুক্ত হয়ে হাওড়া জেলা কংগ্রেসের সভাপতির দায়িত্বও পালন করেন।<br><br><b>সাহিত্যকর্ম:</b><br>বাংলা উপন্যাসকে সাধারণ মানুষের জীবনের সঙ্গে নিবিড়ভাবে যুক্ত করার ক্ষেত্রে তাঁর অবদান অনন্য। তাঁর অধিকাংশ উপন্যাস বিভিন্ন ভাষায় অনূদিত হয়েছে এবং বহু জনপ্রিয় চলচ্চিত্র নির্মিত হয়েছে।<br><br><b>উল্লেখযোগ্য গ্রন্থসমূহ:</b><br>১. বড়দিদি<br>২. দেবদাস<br>৩. শ্রীকান্ত (চার খণ্ড)<br>৪. চরিত্রহীন<br>৫. পথের দাবী<br>৬. পরিণীতা<br>৭. দত্তা<br>৮. পল্লীসমাজ<br>৯. গৃহদাহ<br>১০. শেষ প্রশ্ন<br><br><b>সম্মাননা:</b><br>১৯২৩ সালে কলকাতা বিশ্ববিদ্যালয় থেকে জগত্তারিণী স্বর্ণপদক লাভ করেন। ১৯৩৬ সালে ঢাকা বিশ্ববিদ্যালয় তাঁকে সম্মানসূচক ডি.লিট উপাধিতে ভূষিত করে।<br><br><b>জীবনাবসান:</b><br>১৬ জানুয়ারি ১৯৩৮ সালে কলকাতায় মৃত্যুবরণ করেন। বাংলা সাহিত্যে তাঁর সৃষ্টি আজও সমানভাবে পাঠকপ্রিয় এবং কালজয়ী।'
},
  'বঙ্কিমচন্দ্র চট্টোপাধ্যায়': {
  img: 'https://i.postimg.cc/L5vyxWwQ/bankim-chandra-chatterjee.jpg',
  bio: 'সাহিত্য সম্রাট বঙ্কিমচন্দ্র চট্টোপাধ্যায় (২৬ জুন ১৮৩৮ – ৮ এপ্রিল ১৮৯৪) ছিলেন উনিশ শতকের অন্যতম শ্রেষ্ঠ বাঙালি ঔপন্যাসিক, প্রাবন্ধিক ও সাংবাদিক। বাংলা গদ্য ও উপন্যাসের বিকাশে তাঁর অসামান্য অবদানের জন্য তাঁকে "বাংলা উপন্যাসের জনক" বলা হয়। তিনি ভারতের জাতীয় স্তোত্র <b>বন্দে মাতরম্</b>-এর রচয়িতা।<br><br><b>জন্ম ও পরিচয়:</b> ২৬ জুন ১৮৩৮ সালে উত্তর ২৪ পরগনার কাঁঠালপাড়া গ্রামে জন্মগ্রহণ করেন। পেশাগত জীবনে তিনি ব্রিটিশ সরকারের ডেপুটি ম্যাজিস্ট্রেট ও ডেপুটি কালেক্টর হিসেবে দায়িত্ব পালন করেন। কলকাতা বিশ্ববিদ্যালয়ের প্রথম ব্যাচের অন্যতম বিএ পাস ছাত্র ছিলেন।<br><br><b>সাহিত্যকর্ম:</b> বাংলা সাহিত্যে তাঁর মোট ১৪টি উপন্যাস বিশেষভাবে সমাদৃত। উল্লেখযোগ্য রচনার মধ্যে রয়েছে <i>দুর্গেশনন্দিনী</i>, <i>কপালকুণ্ডলা</i>, <i>বিষবৃক্ষ</i>, <i>আনন্দমঠ</i> ও <i>দেবী চৌধুরাণী</i>।<br><br><b>অন্যান্য অবদান:</b> ১৮৭২ সালে তিনি <b>বঙ্গদর্শন</b> সাহিত্য পত্রিকা প্রতিষ্ঠা করেন। তাঁর <i>আনন্দমঠ</i> উপন্যাস এবং <b>বন্দে মাতরম্</b> গান ভারতের স্বাধীনতা আন্দোলনে বিশেষ অনুপ্রেরণা জুগিয়েছিল।<br><br><b>মৃত্যু:</b> ৮ এপ্রিল ১৮৯৪ সালে কলকাতায় তিনি মৃত্যুবরণ করেন।'
},
  'হুমায়ূন আহমেদ': {
  img: 'https://i.ibb.co/W4vJYtn0/humayun-ahmed.png',
  bio: 'হুমায়ূন আহমেদ (১৩ নভেম্বর ১৯৪৮ – ১৯ জুলাই ২০১২) ছিলেন বাংলাদেশের সর্বকালের অন্যতম জনপ্রিয় কথাসাহিত্যিক, নাট্যকার, গীতিকার, চিত্রনাট্যকার ও চলচ্চিত্র নির্মাতা। বাংলা কথাসাহিত্যে সংলাপপ্রধান সহজ-সরল ভাষাশৈলীর প্রবর্তক হিসেবে তিনি বিশেষভাবে সমাদৃত। বিজ্ঞান কল্পকাহিনি, উপন্যাস, নাটক ও চলচ্চিত্র—সব ক্ষেত্রেই তিনি অনন্য অবদান রেখে বাংলা সাহিত্যে এক স্বতন্ত্র ধারা সৃষ্টি করেছেন।<br><br><b>জন্ম ও শিক্ষাজীবন:</b><br>১৩ নভেম্বর ১৯৪৮ সালে নেত্রকোণার মোহনগঞ্জে জন্মগ্রহণ করেন। পিতা শহীদ পুলিশ কর্মকর্তা ফয়জুর রহমান আহমেদ এবং মাতা আয়েশা ফয়েজ। ঢাকা বিশ্ববিদ্যালয় থেকে রসায়নে উচ্চশিক্ষা সম্পন্ন করে পরবর্তীতে একই বিশ্ববিদ্যালয়ের রসায়ন বিভাগে অধ্যাপনা করেন।<br><br><b>কর্মজীবন:</b><br>বিশ্ববিদ্যালয়ে শিক্ষকতার পাশাপাশি সাহিত্যচর্চা শুরু করেন। পরবর্তীতে লেখালেখি ও চলচ্চিত্র নির্মাণে সম্পূর্ণভাবে আত্মনিয়োগ করেন এবং বাংলা সাহিত্য ও বিনোদন জগতে অসাধারণ জনপ্রিয়তা অর্জন করেন।<br><br><b>সাহিত্যকর্ম:</b><br>তিনি তিন শতাধিক গ্রন্থ রচনা করেছেন। তাঁর সৃষ্ট হিমু, মিসির আলি এবং শুভ্র বাংলা সাহিত্যের সবচেয়ে জনপ্রিয় কাল্পনিক চরিত্রগুলোর মধ্যে অন্যতম।<br><br><b>উল্লেখযোগ্য গ্রন্থ:</b><br>১. নন্দিত নরকে<br>২. শঙ্খনীল কারাগার<br>৩. জোছনা ও জননীর গল্প<br>৪. মধ্যাহ্ন<br>৫. বাদশাহ নামদার<br>৬. দেয়াল<br><br><b>নাটক ও চলচ্চিত্র:</b><br>টেলিভিশন নাটকের মাধ্যমে তিনি নতুন ধারার সূচনা করেন। তাঁর জনপ্রিয় নাটকের মধ্যে রয়েছে <i>এইসব দিনরাত্রি</i>, <i>বহুব্রীহি</i>, <i>কোথাও কেউ নেই</i> এবং <i>আজ রবিবার</i>। চলচ্চিত্র নির্মাতা হিসেবেও তিনি সমান সফল। তাঁর পরিচালিত উল্লেখযোগ্য চলচ্চিত্র হলো <i>আগুনের পরশমণি</i>, <i>শ্রাবণ মেঘের দিন</i>, <i>শ্যামল ছায়া</i>, <i>দুই দুয়ারী</i> এবং <i>ঘেটুপুত্র কমলা</i>।<br><br><b>সম্মাননা:</b><br>বাংলা সাহিত্যে অসামান্য অবদানের জন্য ১৯৮১ সালে বাংলা একাডেমি সাহিত্য পুরস্কার, ১৯৯৪ সালে একুশে পদক এবং বিভিন্ন সময়ে একাধিক জাতীয় চলচ্চিত্র পুরস্কার লাভ করেন।<br><br><b>জীবনাবসান:</b><br>১৯ জুলাই ২০১২ সালে যুক্তরাষ্ট্রের নিউইয়র্কে চিকিৎসাধীন অবস্থায় মৃত্যুবরণ করেন। বাংলা সাহিত্য, নাটক ও চলচ্চিত্রে তাঁর অবদান আজও সমানভাবে সমাদৃত এবং প্রজন্মের পর প্রজন্ম পাঠক-দর্শকদের অনুপ্রেরণা জোগাচ্ছে।'
},
  'নির্মলেন্দু গুণ': {
  img: 'https://i.ibb.co/v4Fywdqb/nirmalendu-goon.jpg',
  bio: 'নির্মলেন্দু গুণ (পূর্ণনাম: নির্মলেন্দু প্রকাশ গুণ চৌধুরী) বাংলাদেশের অন্যতম জনপ্রিয় আধুনিক কবি, সাহিত্যিক, গদ্যকার ও চিত্রশিল্পী। সত্তরের দশক থেকে তাঁর প্রতিবাদী, সমাজসচেতন, প্রেমময় ও দেশপ্রেমমূলক কবিতার মাধ্যমে তিনি বাংলা সাহিত্যে এক স্বতন্ত্র অবস্থান গড়ে তুলেছেন। সহজ-সরল ভাষায় গভীর রাজনৈতিক চেতনা, মানবিকতা ও আবেগ প্রকাশ তাঁর কবিতার অন্যতম বৈশিষ্ট্য।<br><br><b>জন্ম ও প্রারম্ভিক জীবন:</b><br>২১ জুন ১৯৪৫ সালে নেত্রকোণা জেলার বারহাট্টা উপজেলার কাশবন গ্রামে জন্মগ্রহণ করেন। পিতা সুখেন্দু প্রকাশ গুণ এবং মাতা বীণাপাণি। শৈশবে তাঁর ডাকনাম ছিল "রতন"।<br><br><b>সাহিত্যকর্ম:</b><br>নারীপ্রেম, শ্রেণীসংগ্রাম, মুক্তিযুদ্ধ, স্বৈরাচারবিরোধী আন্দোলন এবং দেশপ্রেম তাঁর কবিতার প্রধান উপজীব্য। কবিতার পাশাপাশি তিনি গল্প, গদ্য, ভ্রমণকাহিনি রচনা করেছেন এবং চিত্রশিল্পী হিসেবেও পরিচিত।<br><br><b>উল্লেখযোগ্য গ্রন্থ ও কবিতা:</b><br>১. প্রেমাংশুর রক্ত চাই (প্রথম কাব্যগ্রন্থ, ১৯৭০)<br>২. হুলিয়া<br>৩. স্বাধীনতা, এই শব্দটি কীভাবে আমাদের হলো<br>৪. মানুষ<br>৫. তোমার চোখ এত লাল কেন<br>৬. আফ্রিকার প্রেমের কবিতা<br>৭. আমি আজ কারো রক্ত চাইতে আসিনি<br><br><b>সম্মাননা:</b><br>বাংলা সাহিত্যে অসামান্য অবদানের জন্য ১৯৮২ সালে বাংলা একাডেমি সাহিত্য পুরস্কার, ২০০১ সালে একুশে পদক এবং ২০১৬ সালে স্বাধীনতা পুরস্কার লাভ করেন।<br><br><b>অবদান:</b><br>সমকালীন বাংলা কবিতার অন্যতম প্রধান কণ্ঠস্বর হিসেবে নির্মলেন্দু গুণ আজও পাঠকসমাজে সমানভাবে জনপ্রিয়। তাঁর কবিতায় প্রতিবাদ, প্রেম, মানবতা ও স্বাধীনতার চেতনা এক অনন্য শিল্পরূপে প্রকাশ পেয়েছে।'
},
  'চণ্ডীদাস': {
  img: 'https://i.postimg.cc/m29gyZCS/chondi-das.jpg',
  bio: 'মধ্যযুগের প্রখ্যাত বৈষ্ণব পদকর্তা চণ্ডীদাস (১৩৩৯–১৩৯৯) বাংলা সাহিত্যের আদি-মধ্যযুগের অন্যতম শ্রেষ্ঠ কবি। বৈষ্ণব পদাবলীর মাধ্যমে তিনি মানবিক প্রেম, ভক্তি এবং সহজিয়া ভাবধারাকে এক অনন্য উচ্চতায় পৌঁছে দেন। তাঁর রচিত পদাবলী চৈতন্যদেবের আবির্ভাবের পূর্বেই বাংলার মানুষের মুখে মুখে ছড়িয়ে পড়ে এবং পরবর্তীকালে চৈতন্যদেব নিজেও তাঁর পদ গভীর শ্রদ্ধার সঙ্গে আস্বাদন করতেন।<br><br><b>জীবন ও পরিচয়:</b> চণ্ডীদাসের জীবন সম্পর্কে নির্ভরযোগ্য তথ্য খুবই সীমিত। জনশ্রুতি অনুযায়ী রজকিনী রামী তাঁর সহজসাধনার সঙ্গিনী ছিলেন। তাঁর রচনায় মানবপ্রেম, ঈশ্বরপ্রেম এবং সমাজের প্রচলিত ভেদাভেদের বিরুদ্ধে এক গভীর মানবিক চেতনা প্রকাশ পেয়েছে।<br><br><b>সাহিত্যকর্ম:</b> বৈষ্ণব পদাবলীর অন্যতম শ্রেষ্ঠ রচয়িতা হিসেবে চণ্ডীদাস বাংলা সাহিত্যে চিরস্মরণীয়। তাঁর পদে রাধা-কৃষ্ণের প্রেম, মানবিক অনুভূতি, আধ্যাত্মিকতা এবং সহজিয়া দর্শনের অসাধারণ প্রকাশ দেখা যায়।<br><br><b>উল্লেখযোগ্য পদ:</b><br>• "ব্রহ্মাণ্ড ব্যাপিয়া আছয়ে যে জন, কেহ না জানয়ে তারে; প্রেমের আরতি যে জন জানয়ে সেই সে চিনিতে পারে।"<br>• "কহে চণ্ডীদাস, কানুর পিরীতি – জাতিকুলশীল ছাড়া।"<br>• "প্রণয় করিয়া ভাঙ্গয়ে যে, সাধন-অঙ্গ পায় না সে।"<br>• "কি লাগিয়া ডাকরে বাঁশী, আর কিবা চাও; বাকি আছে প্রাণ আমার, তাহা লৈয়া যাও।"<br><br><b>অমর বাণী:</b><br>"শুনহ মানুষ ভাই, সবার উপরে মানুষ সত্য, তাহার উপরে নাই।"<br><br>এই মানবতাবাদী বাণী বাংলা সাহিত্য ও সংস্কৃতিতে আজও সমানভাবে প্রাসঙ্গিক এবং চণ্ডীদাসকে মধ্যযুগের অন্যতম শ্রেষ্ঠ মানবতাবাদী কবি হিসেবে প্রতিষ্ঠিত করেছে।'
},
  'মাইকেল মধুসূদন দত্ত': {
  img: 'https://i.postimg.cc/SxRw24XZ/michael-madhusudan-dutt.webp',
  bio: 'মাইকেল মধুসূদন দত্ত (১৮২৪–১৮৭৩) ছিলেন ১৯ শতকের অন্যতম শ্রেষ্ঠ বাঙালি কবি, নাট্যকার এবং বাংলা নবজাগরণ সাহিত্যের প্রধান পুরোধা ব্যক্তিত্ব। বাংলা সাহিত্যে প্রথম আধুনিকতার প্রবর্তন এবং চিরাচরিত নিয়ম ভেঙে নতুন ধারা সৃষ্টির জন্য তাঁকে প্রথম আধুনিক ও বিদ্রোহী কবি হিসেবে গণ্য করা হয়। তিনি বাংলা ভাষায় প্রথম অমিত্রাক্ষর ছন্দ এবং সনেট (চতুর্দশপদী কবিতা) প্রবর্তন করেন।<br><br><b>জন্ম ও শিক্ষা:</b> ২৫ জানুয়ারি, ১৮২৪ সালে যশোরের সাগরদাঁড়ি গ্রামে জন্মগ্রহণ করেন। পিতা রাজনারায়ণ দত্ত ছিলেন কলকাতার প্রতিষ্ঠিত উকিল, মাতা জাহ্নবী দেবী। কলকাতার হিন্দু কলেজ ও বিশপস কলেজে শিক্ষা লাভ করেন।<br><br><b>জীবন ও ধর্মান্তর:</b> ছোটবেলা থেকেই পাশ্চাত্য সংস্কৃতির প্রতি তীব্রভাবে আকৃষ্ট ছিলেন এবং ইংরেজি ভাষার বড় কবি হওয়ার স্বপ্ন দেখতেন। ১৮৪৩ সালে হিন্দু বিয়ে এড়াতে এবং বিলেত যাওয়ার আকাঙ্ক্ষায় তিনি খ্রিস্টধর্ম গ্রহণ করেন এবং নামের শুরুতে ‘মাইকেল’ যুক্ত করেন। তবে জীবনের শেষভাগে পাশ্চাত্য মোহ থেকে মুক্ত হয়ে গভীর মাতৃভাষা প্রীতিতে ফিরে আসেন, যা ‘কপোতাক্ষ নদ’ কবিতায় প্রকাশ পায়।<br><br><b>সাহিত্যিক অবদান:</b> বাংলা সাহিত্যের প্রায় প্রতিটি শাখায় তিনি বৈপ্লবিক পরিবর্তন এনেছিলেন। ‘মেঘনাদবধ কাব্য’ (১৮৬১) বাংলা সাহিত্যের প্রথম ও শ্রেষ্ঠ সার্থক ট্রাজিক মহাকাব্য। রামায়ণের রাবণ-চরিত্রকে খলনায়কের পরিবর্তে বীর ও দেশপ্রেমিক হিসেবে উপস্থাপন করে তিনি নতুন সাহিত্যিক বিদ্রোহের জন্ম দেন। ‘শর্মিষ্ঠা’ (১৮৫৯) বাংলা ভাষার প্রথম পাশ্চাত্য শৈলীর মৌলিক নাটক। ‘কৃষ্ণকুমারী’ বাংলা সাহিত্যের প্রথম সার্থক ট্র্যাজেডি নাটক। ‘বীরাঙ্গনা কাব্য’ ও ‘চতুর্দশপদী কবিতাবলী’ বাংলা সনেটের প্রথম সংকলন।<br><br><b>উল্লেখযোগ্য সৃষ্টি:</b><br>• মহাকাব্য: মেঘনাদবধ কাব্য<br>• নাটক: শর্মিষ্ঠা, পদ্মাবতী, কৃষ্ণকুমারী<br>• প্রহসন: একেই কি বলে সভ্যতা?, বুড়ো শালিকের ঘাড়ে রোঁ<br>• কাব্যগ্রন্থ: বীরাঙ্গনা কাব্য, চতুর্দশপদী কবিতাবলী<br><br><b>শেষ জীবন:</b> পাশ্চাত্য জীবনযাত্রার উচ্চাভিলাষ এবং তীব্র ঋণের কারণে তাঁর শেষ জীবন চরম দারিদ্র্য ও কষ্টের মধ্যে কেটেছে। কঠিন সময়ে ঈশ্বরচন্দ্র বিদ্যাসাগর তাঁকে অর্থ পাঠিয়ে বড় বিপদ থেকে রক্ষা করেছিলেন। ১৮৭৩ সালে কলকাতার আলিপুর জেনারেল হাসপাতালে স্ত্রী হেনরিয়েটার মৃত্যুর মাত্র তিন দিন পর তিনি শেষ নিঃশ্বাস ত্যাগ করেন।<br><br><b>সমাধি-লিপি:</b><br>"দাঁড়াও, পথিক-বর, জন্ম যদি তব বঙ্গে!<br>তিষ্ঠ ক্ষণকাল! এ সমাধি-স্থলে..."<br><br>কলকাতার লোয়ার সার্কুলার রোড ক্রিশ্চিয়ান সেমেটারিতে সমাহিত এই মহাকবি বাংলা সাহিত্যে চির বিদ্রোহী ও আধুনিকতার পথিকৃৎ হিসেবে অমর হয়ে আছেন।'
},
  'ফজল-এ খোদা': {

var dcAllPosts = [
  {% for post in site.posts %}
  {
    "title": {{ post.title | jsonify }},
    "url": {{ post.url | relative_url | jsonify }},
    "date": {{ post.date | date: "%d %B %Y" | jsonify }},
    "author": {{ post.author | default: "" | jsonify }},
    "image": {% if post.image %}{{ post.image | relative_url | jsonify }}{% else %}null{% endif %},
    "excerpt": {{ post.content | strip_html | truncatewords: 25 | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

function dcNormalize(s) { return (s || "").toString().trim().toLowerCase(); }

var dcParams = new URLSearchParams(window.location.search);
var dcAuthorName = (dcParams.get("name") || "").trim();

var dcProfile = document.getElementById("dc-author-profile");
var dcGrid = document.getElementById("dc-author-grid");
var dcContainer = document.getElementById("dc-author-posts");
var dcEmptyMsg = document.getElementById("dc-author-empty");
var dcTitle = document.getElementById("dc-author-title");

function dcAvatarHTML(name, size) {
  var info = authorData[name];
  if (info && info.img) {
    return '<img src="' + info.img + '" alt="' + name + '" class="author-avatar-img" style="width:' + size + 'px; height:' + size + 'px;">';
  }
  return '<div class="author-avatar" style="width:' + size + 'px; height:' + size + 'px; font-size:' + (size * 0.4) + 'px;">' + name.charAt(0) + '</div>';
}

if (!dcAuthorName) {
  var dcCounts = {};
  dcAllPosts.forEach(function (p) {
    var name = (p.author || "").trim();
    if (!name) return;
    dcCounts[name] = (dcCounts[name] || 0) + 1;
  });
  var dcNames = Object.keys(dcCounts).sort(function (a, b) { return a.localeCompare(b, "bn"); });

  if (dcNames.length === 0) {
    dcEmptyMsg.textContent = "এখনো কোনো লেখকের তথ্য পাওয়া যায়নি।";
    dcEmptyMsg.style.display = "block";
  } else {
    dcNames.forEach(function (name) {
      var card = document.createElement("a");
      card.href = "/author/?name=" + encodeURIComponent(name);
      card.className = "author-card";
      card.innerHTML =
        dcAvatarHTML(name, 48) +
        '<div class="author-info">' +
          '<span class="author-name">' + name + '</span>' +
          '<span class="author-count">' + dcCounts[name] + ' টি পোস্ট</span>' +
        '</div>';
      dcGrid.appendChild(card);
    });
  }
} else {
  dcTitle.textContent = dcAuthorName;
  dcGrid.style.display = "none";

  var dcInfo = authorData[dcAuthorName];
  dcProfile.style.display = "flex";
  dcProfile.innerHTML =
    dcAvatarHTML(dcAuthorName, 110) +
    '<div class="author-profile-text">' +
      (dcInfo && dcInfo.bio ? '<p class="author-bio">' + dcInfo.bio + '</p>' : '<p class="author-bio" style="color:#999;">এই লেখকের সম্পর্কে এখনো বিস্তারিত তথ্য যুক্ত করা হয়নি।</p>') +
    '</div>';

  var dcTarget = dcNormalize(dcAuthorName);
  var dcFiltered = dcAllPosts.filter(function (p) { return dcNormalize(p.author) === dcTarget; });

  if (dcFiltered.length === 0) {
    dcEmptyMsg.textContent = "এই লেখকের কোনো পোস্ট পাওয়া যায়নি।";
    dcEmptyMsg.style.display = "block";
  } else {
    dcFiltered.forEach(function (post) {
      var div = document.createElement("div");
      div.className = "post-item";
      div.innerHTML =
        '<a href="' + post.url + '">' +
          (post.image ? '<img src="' + post.image + '" alt="' + post.title + '" class="post-thumb">' : '') +
        '</a>' +
        '<h2><a href="' + post.url + '">' + post.title + '</a></h2>' +
        '<span class="post-date">' + post.date + '</span>' +
        '<p>' + post.excerpt + '</p>' +
        '<a href="' + post.url + '" class="read-more-btn">আরও পড়ুন →</a>';
      dcContainer.appendChild(div);
    });
  }
}
</script>

<style>
.dc-author-archive { max-width: 800px; margin: 20px auto; padding: 15px; }
.dc-author-archive .archive-title { font-size: 28px; margin-bottom: 30px; border-bottom: 3px solid #d32f2f; padding-bottom: 10px; }

.author-grid { display: flex; flex-direction: column; gap: 12px; }
.author-card { display: flex; align-items: center; gap: 14px; padding: 14px; border: 1px solid #e5e5e5; border-radius: 10px; text-decoration: none; }
.author-card:hover { background: #fafafa; }
.author-info { display: flex; flex-direction: column; }
.author-name { font-size: 17px; font-weight: 600; color: #111; }
.author-count { font-size: 13px; color: #777; }

.author-avatar { border-radius: 50%; background: #d32f2f; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.author-avatar-img { border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid #d32f2f; }

.author-profile { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 35px; padding-bottom: 25px; border-bottom: 1px solid #ddd; }
.author-profile-text { flex: 1; text-align: left; }
.author-bio { color: #333; line-height: 1.9; font-size: 15px; margin: 0; text-align: left; }

.post-item { margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid #ddd; }
.post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
.post-item h2 { margin: 10px 0; }
.post-item h2 a { color: #111; text-decoration: none; font-size: 22px; }
.post-item h2 a:hover { color: #d32f2f; }
.post-date { color: #666; font-size: 14px; }
.post-item p { color: #333; line-height: 1.8; margin: 12px 0; }
.read-more-btn { display: inline-block; background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
.read-more-btn:hover { background: #b71c1c; }

@media (max-width: 480px) {
  .author-profile { flex-direction: column; align-items: center; text-align: center; }
}
</style>
