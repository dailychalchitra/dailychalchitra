<script>
//<![CDATA[
function loadBloggerPosts(){
  var blogId='4135877478545229144';
  var script=document.createElement('script');
  script.src='https://www.blogger.com/feeds/'+blogId+'/posts/summary?alt=json-in-script&callback=showPosts&max-results=10';
  script.onerror=function(){
    document.getElementById('blog-posts-container').innerHTML='<p style="text-align:center;padding:40px;color:red;">পোস্ট লোড করতে সমস্যা হয়েছে। Blogger > Settings > Site feed = Full আছে কিনা চেক করেন।</p>';
  };
  document.head.appendChild(script);
}
window.showPosts=function(json){
  var container=document.getElementById('blog-posts-container');
  if(!container)return;
  var posts=json.feed.entry;
  if(!posts||posts.length==0){
    container.innerHTML='<p style="text-align:center;padding:20px;">কোনো পোস্ট পাওয়া যায়নি।</p>';
    return;
  }
  var html='';
  for(var i=0;i<posts.length;i++){
    var entry=posts[i];
    var title=entry.title.$t;
    var link='';
    for(var j=0;j<entry.link.length;j++){
      if(entry.link[j].rel=='alternate'){link=entry.link[j].href;break;}
    }
    var summary=entry.summary?entry.summary.$t.replace(/<[^>]*>/g,'').substring(0,150):'';
    var date=new Date(entry.published.$t).toLocaleDateString('bn-BD');
    var thumb=entry.media$thumbnail?entry.media$thumbnail.url.replace('s72-c','s400'):'https://i.postimg.cc/3w757F6N/Daily-Chalchitra.png';
    var label=entry.category?entry.category[0].term:'সংবাদ';
    html+='<article style="background:#fff;margin:0 0 20px 0;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;"><a href="'+link+'" target="_blank"><img src="'+thumb+'" style="width:100%;height:220px;object-fit:cover;"><div style="padding:15px;"><span style="background:#C00000;color:#fff;padding:3px 10px;border-radius:3px;font-size:12px;display:inline-block;margin-bottom:10px;">'+label+'</span><h2 style="font-size:20px;margin:0 0 10px 0;font-weight:700;line-height:1.4;color:#1a1a1a;">'+title+'</h2><p style="font-size:15px;color:#555;margin:0 0 12px 0;line-height:1.6;">'+summary+'...</p><div style="font-size:13px;color:#777;border-top:1px solid #f0f0f0;padding-top:10px;">প্রকাশ: '+date+' | <b>আরও পড়ুন »</b></div></div></a></article>';
  }
  container.innerHTML=html;
}
if(document.readyState=='loading'){
  document.addEventListener('DOMContentLoaded',loadBloggerPosts);
}else{
  loadBloggerPosts();
}
//]]>
</script>
