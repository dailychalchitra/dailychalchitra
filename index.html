---
layout: default
title: দৈনিক চালচিত্র
---

<style>
  .menu{background:#C00000;padding:12px;text-align:center;}
  .menu a{color:#fff;margin:0 12px;text-decoration:none;font-weight:700;font-size:16px;}
  .container{max-width:800px;margin:20px auto;padding:0 15px}
  .post-card{background:#fff;margin-bottom:20px;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden}
  .post-card img{width:100%;height:220px;object-fit:cover}
  .post-card-content{padding:15px}
  .category-tag{background:#C00000;color:#fff;padding:3px 10px;border-radius:3px;font-size:12px}
  .post-title{font-size:20px;margin:10px 0;font-weight:700;color:#000;line-height:1.4}
  .post-excerpt{font-size:15px;color:#555;line-height:1.6}
  .post-meta{font-size:13px;color:#777;border-top:1px solid #f0f0f0;padding-top:10px;margin-top:12px}
</style>

<div class="container">
  <h1 style="text-align:center;font-size:26px;">সর্বশেষ সংবাদ</h1>
  
  {% for post in site.posts %}
  <article class="news-card post-card">
    <a href="{{ post.url }}" style="text-decoration:none;">
      <img src="{{ post.image }}" alt="{{ post.title }}">
      <div class="post-card-content">
        <span class="category-tag">{{ post.category }}</span>
        <h2 class="post-title">{{ post.title }}</h2>
        <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 25 }}</p>
        <div class="post-meta">প্রকাশ: {{ post.date | date: "%d %B %Y" }} | <b>আরও পড়ুন »</b></div>
      </div>
    </a>
  </article>
  {% endfor %}
</div>
