<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>দৈনিক চালচিত্র</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- হেডার অংশ -->
    <header id="my-new-header">
        <!-- আপনার হেডার কোড এখানে থাকবে -->
    </header>

    <!-- মূল পোস্টের জায়গা -->
    <div class="blog-posts">
        <article class="post-outer">
            <h2 class="post-title">স্বাগতম আমাদের নতুন সাইটে</h2>
            <div class="post-body">
                এখানে আপনার ব্লগের নতুন নতুন খবর নিয়মিত আপডেট করা হবে। দয়া করে প্রতিদিন আমাদের সাথেই থাকুন।
            </div>
        </article>
        
        <article class="post-outer">
            <h2 class="post-title">সহযোগিতার জন্য ধন্যবাদ</h2>
            <div class="post-body">
                দৈনিক চালচিত্র সবসময় আপনাদের সাথে আছে। সত্য প্রকাশে আমরা অবিচল।
            </div>
        </article>
    </div>

    <!-- ফুটার অংশ -->
    <footer>
        <!-- আপনার ফুটার কোড এখানে থাকবে -->
    </footer>
</body>
</html>
