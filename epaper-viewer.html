<link rel="stylesheet" href="/assets/epaper/css/epaper.css">


<div class="dc-viewer">


    <h1 id="dc-title">
        ই-পেপার
    </h1>


    <div id="dc-meta"></div>



    <div class="dc-viewer-toolbar">


        <button id="dc-download">
            📥 ডাউনলোড
        </button>


        <button id="dc-print">
            🖨️ প্রিন্ট
        </button>


        <button id="dc-fullscreen">
            ⛶ ফুলস্ক্রিন
        </button>


    </div>




    <div class="dc-controls">


        <button id="dc-prev">
            ⬅️ পূর্বের পৃষ্ঠা
        </button>



        <span id="dc-page-info">
            পৃষ্ঠা 1 / 0
        </span>



        <button id="dc-next">
            পরের পৃষ্ঠা ➡️
        </button>



        <button id="dc-zoom-in">
            🔍+
        </button>



        <button id="dc-zoom-out">
            🔍-
        </button>


    </div>





    <div class="dc-pdf-box">


        <div id="dc-pdf-viewer">


            <canvas id="dc-pdf-canvas">
            </canvas>


        </div>


    </div>



</div>





<style>


.dc-controls{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin:20px auto;

}



.dc-controls button{

    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#C00000;
    color:white;
    cursor:pointer;

}



#dc-page-info{

    font-weight:bold;

}





.dc-pdf-box{

    width:100%;
    overflow:hidden;
    text-align:center;

}



#dc-pdf-viewer{

    width:100%;
    overflow:auto;

}



#dc-pdf-canvas{

    max-width:100%;
    height:auto;

}



</style>





<script src="/assets/epaper/lib/pdfjs/pdf.min.js"></script>

<script src="/assets/epaper/lib/viewer/viewer-engine.js"></script>

<script src="/assets/epaper/js/viewer.js"></script>
