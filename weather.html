<div class="dc-weather-page">
  <h1 class="archive-title">আবহাওয়া সংবাদ</h1>

  <div id="dc-weather-status" class="weather-status">আপনার অবস্থান সনাক্ত করা হচ্ছে...</div>

  <div id="dc-weather-card" class="weather-card" style="display:none;">
    <div class="weather-location" id="dc-weather-location"></div>
    <div class="weather-main">
      <div class="weather-icon" id="dc-weather-icon"></div>
      <div class="weather-temp" id="dc-weather-temp"></div>
    </div>
    <div class="weather-desc" id="dc-weather-desc"></div>
    <div class="weather-extra" id="dc-weather-extra"></div>
    <div class="weather-updated" id="dc-weather-updated"></div>
  </div>

  <div id="dc-weather-forecast" class="weather-forecast"></div>

  <button id="dc-weather-retry" class="weather-retry-btn" style="display:none;" onclick="dcLoadWeather()">আবার চেষ্টা করুন</button>
</div>

<script>
var dcWeatherCodes = {
  0: ['☀️', 'পরিষ্কার আকাশ'],
  1: ['🌤️', 'মূলত পরিষ্কার'],
  2: ['⛅', 'আংশিক মেঘলা'],
  3: ['☁️', 'মেঘলা'],
  45: ['🌫️', 'কুয়াশা'],
  48: ['🌫️', 'ঘন কুয়াশা'],
  51: ['🌦️', 'লঘু বৃষ্টি'],
  53: ['🌦️', 'মধ্যম বৃষ্টি'],
  55: ['🌧️', 'ভারী বৃষ্টি'],
  61: ['🌧️', 'হালকা বৃষ্টি'],
  63: ['🌧️', 'মধ্যম বৃষ্টি'],
  65: ['🌧️', 'প্রবল বৃষ্টি'],
  71: ['🌨️', 'হালকা তুষারপাত'],
  73: ['🌨️', 'মধ্যম তুষারপাত'],
  75: ['❄️', 'প্রবল তুষারপাত'],
  80: ['🌦️', 'বৃষ্টির ছাট'],
  81: ['🌧️', 'মধ্যম বৃষ্টির ছাট'],
  82: ['⛈️', 'প্রবল বৃষ্টির ছাট'],
  95: ['⛈️', 'ঝড়-বৃষ্টি'],
  96: ['⛈️', 'বজ্রসহ ঝড়'],
  99: ['⛈️', 'প্রবল বজ্রঝড়']
};

function dcWeatherInfo(code) {
  return dcWeatherCodes[code] || ['🌡️', 'আবহাওয়ার তথ্য'];
}

function dcShowError() {
  document.getElementById('dc-weather-status').textContent = 'আবহাওয়ার তথ্য আনতে সমস্যা হয়েছে।';
  document.getElementById('dc-weather-retry').style.display = 'inline-block';
}

function dcShowWeather(lat, lon, placeName) {
  var statusEl = document.getElementById('dc-weather-status');
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
    '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature' +
    '&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto';

  fetch(url).then(function (res) { return res.json(); }).then(function (data) {
    if (!data.current) { dcShowError(); return; }
    statusEl.style.display = 'none';

    document.getElementById('dc-weather-card').style.display = 'block';
    document.getElementById('dc-weather-location').textContent = placeName || 'আপনার অবস্থান';

    var info = dcWeatherInfo(data.current.weather_code);
    document.getElementById('dc-weather-icon').textContent = info[0];
    document.getElementById('dc-weather-temp').textContent = Math.round(data.current.temperature_2m) + '°সে';
    document.getElementById('dc-weather-desc').textContent = info[1];
    document.getElementById('dc-weather-extra').innerHTML =
      'অনুভূত: ' + Math.round(data.current.apparent_temperature) + '°সে &nbsp;•&nbsp; ' +
      'আর্দ্রতা: ' + data.current.relative_humidity_2m + '% &nbsp;•&nbsp; ' +
      'বাতাস: ' + Math.round(data.current.wind_speed_10m) + ' কিমি/ঘ';
    document.getElementById('dc-weather-updated').textContent = 'সর্বশেষ আপডেট: ' + new Date().toLocaleString('bn-BD');

    if (data.daily) {
      var fc = document.getElementById('dc-weather-forecast');
      fc.innerHTML = '<h3>আগামী কয়েক দিনের পূর্বাভাস</h3><div class="forecast-row"></div>';
      var row = fc.querySelector('.forecast-row');
      var days = ['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
      for (var i = 0; i < data.daily.time.length; i++) {
        var d = new Date(data.daily.time[i]);
        var dInfo = dcWeatherInfo(data.daily.weather_code[i]);
        var div = document.createElement('div');
        div.className = 'forecast-day';
        div.innerHTML =
          '<span class="fc-day-name">' + (i === 0 ? 'আজ' : days[d.getDay()]) + '</span>' +
          '<span class="fc-icon">' + dInfo[0] + '</span>' +
          '<span class="fc-temp">' + Math.round(data.daily.temperature_2m_max[i]) + '° / ' + Math.round(data.daily.temperature_2m_min[i]) + '°</span>';
        row.appendChild(div);
      }
    }
  }).catch(dcShowError);
}

function dcReverseGeocode(lat, lon, cb) {
  fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' + lat + '&longitude=' + lon + '&localityLanguage=bn')
    .then(function (res) { return res.json(); })
    .then(function (data) {
      var name = [data.locality, data.principalSubdivision, data.countryName].filter(Boolean).join(', ');
      cb(name);
    })
    .catch(function () { cb(null); });
}

function dcLoadWeather() {
  var statusEl = document.getElementById('dc-weather-status');
  document.getElementById('dc-weather-retry').style.display = 'none';
  document.getElementById('dc-weather-card').style.display = 'none';
  statusEl.style.display = 'block';
  statusEl.textContent = 'আপনার অবস্থান সনাক্ত করা হচ্ছে...';

  function byIP() {
    statusEl.textContent = 'আনুমানিক অবস্থান অনুযায়ী আবহাওয়া আনা হচ্ছে...';
    fetch('https://ipapi.co/json/').then(function (res) { return res.json(); }).then(function (data) {
      if (data && data.latitude && data.longitude) {
        var name = [data.city, data.country_name].filter(Boolean).join(', ');
        dcShowWeather(data.latitude, data.longitude, name);
      } else { dcShowError(); }
    }).catch(dcShowError);
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function (pos) {
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      dcReverseGeocode(lat, lon, function (name) { dcShowWeather(lat, lon, name); });
    }, function () { byIP(); }, { timeout: 8000 });
  } else {
    byIP();
  }
}

dcLoadWeather();
</script>

.weather-main { display: flex; align-items: center; justify-content: center; gap: 14px; }
.weather-icon { font-size: 56px; }
.weather-temp { font-size: 48px; font-weight: 700; color: #d32f2f; }
.weather-desc { font-size: 16px; color: #555; margin-top: 6px; }
.weather-extra { font-size: 13px; color: #888; margin-top: 12px; }

.fc-day-name { font-size: 12px; color: #666; font-weight: 600; }
