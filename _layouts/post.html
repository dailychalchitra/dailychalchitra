---
layout: default
---
<article style="max-width:800px;margin:20px auto;padding:15px;">
  <img src="{{ page.image | relative_url }}" style="width:100%;border-radius:8px;margin-bottom:15px;">
  <span style="background:#C00000;color:white;padding:5px 10px;font-size:14px;border-radius:4px;">
    {{ page.categories | first }}
  </span>
  <h1 style="font-size:28px;margin:15px 0;line-height:1.4;">{{ page.title }}</h1>
  <p style="color:#777;font-size:14px;border-bottom:1px solid #eee;padding-bottom:10px;">
    প্রকাশ: {{ page.date | date: "%d %B, %Y, %I:%M %p" }}
  </p>
  <div style="font-size:17px;line-height:1.8;margin-top:20px;">
    {{ content }}
  </div>

  <div style="margin-top:40px; padding-top:20px; border-top:1px solid #eee; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;">
    
    <a href="{{ site.baseurl }}/" style="color:#c62828; text-decoration:none; border-bottom:1px solid #c62828; padding-bottom:2px; font-size:16px;">
      আরও পড়ুন
    </a>

    {% if page.next.url %}
      <a href="{{ page.next.url | relative_url }}" style="color:#333; text-decoration:none; border-bottom:1px solid #333; padding-bottom:2px; font-size:16px;">
        নতুন পোস্ট
      </a>
    {% else %}
      <span style="color:#999; border-bottom:1px solid #999; padding-bottom:2px; font-size:16px;">
        নতুন পোস্ট
      </span>
    {% endif %}

    {% if page.previous.url %}
      <a href="{{ page.previous.url | relative_url }}" style="color:#333; text-decoration:none; border-bottom:1px solid #333; padding-bottom:2px; font-size:16px;">
        পুরোনো পোস্ট
      </a>
    {% else %}
      <span style="color:#999; border-bottom:1px solid #999; padding-bottom:2px; font-size:16px;">
        পুরোনো পোস্ট
      </span>
    {% endif %}

  </div>
</article>
