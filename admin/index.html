<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Chalchitra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Daily Chalchitra</h1>
        <a href="/admin">নতুন নিউজ লিখুন</a>
    </header>

    <main id="news-container">
        <p>নিউজ লোড হচ্ছে...</p>
    </main>

    <script>
    // Netlify CMS এর নিউজ লিস্ট দেখানোর জন্য
    async function loadNews() {
        const newsContainer = document.getElementById('news-container');
        try {
            // GitHub API দিয়ে content/blog ফোল্ডারের ফাইল লিস্ট আনবে
            const response = await fetch('https://api.github.com/repos/YOUR_GITHUB_USERNAME/dailychalchitra/contents/content/blog');
            const files = await response.json();
            
            newsContainer.innerHTML = ''; // লোডিং লেখা মুছে দিবে
            
            files.reverse().forEach(file => {
                if(file.name.endsWith('.md')) {
                    const title = file.name.replace('.md', '').replace(/-/g, ' ');
                    newsContainer.innerHTML += `
                        <article>
                            <h2>${title}</h2>
                            <p><a href="#">বিস্তারিত পড়ুন</a></p>
                        </article>
                        <hr>
                    `;
                }
            });
        } catch (error) {
            newsContainer.innerHTML = '<p>নিউজ লোড করতে সমস্যা হচ্ছে। GitHub এ content/blog ফোল্ডার চেক করুন।</p>';
        }
    }
    loadNews();
    </script>
</body>
</html>
