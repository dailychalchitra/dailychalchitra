<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>দৈনিক চালচিত্র</title>
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f5f5f5; }
        header { background: #c8102e; color: white; padding: 20px; text-align: center; margin: -20px -20px 20px -20px; }
        header h1 { margin: 0 0 10px 0; }
        header a { color: white; background: #000; padding: 8px 15px; text-decoration: none; border-radius: 5px; }
        article { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        article h2 { margin: 0 0 10px 0; color: #c8102e; }
    </style>
</head>
<body>
    <header>
        <h1>দৈনিক চালচিত্র</h1>
        <a href="/admin">নতুন নিউজ লিখুন</a>
    </header>

    <main id="news-container">
        <p>নিউজ লোড হচ্ছে...</p>
    </main>

    <script>
    async function loadNews() {
        const newsContainer = document.getElementById('news-container');
        const username = 'dailychalchitra'; 
        const repo = 'dailychalchitra';
        
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/blog`);
            const files = await response.json();
            
            newsContainer.innerHTML = '';
            
            files.reverse().forEach(file => {
                if(file.name.endsWith('.md')) {
                    const title = file.name
                        .replace('.md', '')
                        .replace(/^\d{4}-\d{2}-/, '')
                        .replace(/-/g, ' ');
                    
                    newsContainer.innerHTML += `
                        <article>
                            <h2>${title}</h2>
                            <p>প্রকাশিত</p>
                        </article>
                    `;
                }
            });
            
            if(newsContainer.innerHTML === ''){
                newsContainer.innerHTML = '<p>এখনো কোনো নিউজ পাবলিশ করা হয়নি।</p>';
            }
        } catch (error) {
            newsContainer.innerHTML = '<p>নিউজ লোড করতে সমস্যা হচ্ছে।</p>';
        }
    }
    loadNews();
    </script>
</body>
</html>
