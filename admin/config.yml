cat > /mnt/user-data/outputs/config.yml << 'EOF'
backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "নিউজ পোস্ট"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "শিরোনাম", name: "title", widget: "string"}
      - {label: "তারিখ", name: "date", widget: "datetime"}
      - {label: "ফিচার ছবি", name: "thumbnail", widget: "image"}
      - {label: "বিস্তারিত", name: "body", widget: "markdown"}
EOF
python3 -c "
import yaml
with open('/mnt/user-data/outputs/config.yml') as f:
    data = yaml.safe_load(f)
print('YAML valid ✓')
print(data)
"
