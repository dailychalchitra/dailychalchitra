backend:
  name: github
  repo: nimushamim46/dailychalchitra-com
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
    - name: "post"
    label: "নিউজ পোস্ট"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "শিরোনাম", name: "title", widget: "string"}
            - {label: "তারিখ", name: "date", widget: "datetime"}
            - {label: "ফিচার ছবি", name: "thumbnail", widget: "image", required: false}
            - {label: "বিস্তারিত", name: "body", widget: "markdown"}
