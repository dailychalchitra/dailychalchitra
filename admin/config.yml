backend:
  name: git-gateway
  branch: main

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
    - name: "blog"
    label: "নিউজ পোস্ট"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "শিরোনাম", name: "title", widget: "string"}
            - {label: "তারিখ", name: "date", widget: "datetime"}
            - {label: "ফিচার ছবি", name: "thumbnail", widget: "image", required: false}
            - {label: "বিস্তারিত", name: "body", widget: "markdown"}
