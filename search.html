---
layout: default
title: সার্চ ফলাফল
permalink: /search/
---

<div class="dc-search-archive">
  <h1 class="archive-title">অনুসন্ধান ফলাফল: "<span id="dc-search-query"></span>"</h1>
  <div class="post-list" id="dc-search-posts"></div>
  <p id="dc-search-empty" style="display:none; color:#777; text-align:center; margin-top:30px;">কোনো ফলাফল পাওয়া যায়নি। অন্য শব্দ দিয়ে চেষ্টা করুন।</p>
</div>

<script>
  var dcAllPosts = [
    {% for post in site.posts %}
    {
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | relative_url | jsonify }},
      "date": {{ post.date | date: "%d %B %Y" | jsonify }},
      "author": {{ post.author | default: "" | jsonify }},
      "image": {% if post.image %}{{ post.image | relative_url | jsonify }}{% else %}null{% endif %},
      "excerpt": {{ post.content | strip_html | truncatewords: 25 | jsonify }},
      "fulltext": {{ post.content | strip_html | jsonify }},
      "tags": {{ post.tags | jsonify }},
      "categories": {{ post.categories | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function dcLower(s) { return (s || "").toString().toLowerCase(); }

  var dcParams = new URLSearchParams(window.location.search);
  var dcQuery = dcParams.get("q") || "";
  document.getElementById("dc-search-query").textContent = dcQuery;

  var dcQ = dcLower(dcQuery).trim();
  var dcFiltered = dcQ === "" ? [] : dcAllPosts.filter(function (p) {
    var dcAllTerms = (p.tags || []).concat(p.categories || []);
    var tagMatch = dcAllTerms.some(function (t) { return dcLower(t).indexOf(dcQ) !== -1; });
    return dcLower(p.title).indexOf(dcQ) !== -1 || dcLower(p.fulltext).indexOf(dcQ) !== -1 || tagMatch;
  });

  var dcContainer = document.getElementById("dc-search-posts");
  var dcEmptyMsg = document.getElementById("dc-search-empty");

  if (dcFiltered.length === 0) {
    dcEmptyMsg.style.display = "block";
  } else {
    dcFiltered.forEach(function (post) {
      var div = document.createElement("div");
      div.className = "post-item";
      div.innerHTML =
        '<a href="' + post.url + '">' +
          (post.image ? '<img src="' + post.image + '" alt="' + post.title + '" class="post-thumb">' : '') +
        '</a>' +
        '<h2><a href="' + post.url + '">' + post.title + '</a></h2>' +
        '<span class="post-date">' + post.date + ' • ' + post.author + '</span>' +
        '<p>' + post.excerpt + '</p>' +
        '<a href="' + post.url + '" class="read-more-btn">আরও পড়ুন →</a>';
      dcContainer.appendChild(div);
    });
  }
</script>

<style>
.dc-search-archive { max-width: 800px; margin: 20px auto; padding: 15px; }
.dc-search-archive .archive-title { font-size: 26px; margin-bottom: 30px; border-bottom: 3px solid #d32f2f; padding-bottom: 10px; word-break: break-word; }
.dc-search-archive .post-item { margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid #ddd; }
.dc-search-archive .post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
.dc-search-archive .post-item h2 { margin: 10px 0; }
.dc-search-archive .post-item h2 a { color: #111; text-decoration: none; font-size: 22px; }
.dc-search-archive .post-item h2 a:hover { color: #d32f2f; }
.dc-search-archive .post-date { color: #666; font-size: 14px; }
.dc-search-archive .post-item p { color: #333; line-height: 1.8; margin: 12px 0; }
.dc-search-archive .read-more-btn { display: inline-block; background: #d32f2f; color: #fff; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 10px; }
.dc-search-archive .read-more-btn:hover { background: #b71c1c; }
</style>
